# nginx server block for Mission Control (Batch BB) — TLS termination + reverse
# proxy to the Docker mc_app container on 127.0.0.1:3000.
#
# Install:
#   sudo cp docker/nginx-mission-control.conf /etc/nginx/sites-available/mission-control
#   sudo ln -s /etc/nginx/sites-available/mission-control /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Self-signed cert (one-time generation):
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/mission-control.key \
#     -out    /etc/nginx/ssl/mission-control.crt \
#     -subj   "/CN=72.62.33.12" \
#     -addext "subjectAltName=IP:72.62.33.12"
#
# Real domain + Let's Encrypt swap (when you have a domain):
#   - Change `server_name 72.62.33.12;` to your domain
#   - Replace the ssl_certificate / ssl_certificate_key lines with the
#     Certbot-managed paths (typically /etc/letsencrypt/live/<domain>/...)
#   - certbot --nginx -d <domain>
#
# Long-running pipelines and SSE need generous timeouts; keep these.

# HTTP → HTTPS redirect (only when accessing via Mission Control endpoint,
# leave default :80 server alone so other apps aren't affected).
server {
    listen 80;
    listen [::]:80;
    server_name 72.62.33.12;

    # Default catch-all on 80 stays with the existing nginx default server;
    # this block only matches when the Host header is the VPS IP.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 72.62.33.12;

    ssl_certificate     /etc/nginx/ssl/mission-control.crt;
    ssl_certificate_key /etc/nginx/ssl/mission-control.key;

    # Modern TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Hardening — keep these even though the app's middleware also sets some.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS only works with a real cert (browser won't honor it on self-signed).
    # Uncomment once Let's Encrypt is in place:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Body size — large state PUTs from the client snapshot, large brief uploads.
    client_max_body_size 20m;

    # Long-running task generations + SSE.
    proxy_read_timeout 5m;
    proxy_send_timeout 5m;
    proxy_connect_timeout 30s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;        # required for SSE event streams to flush
    proxy_request_buffering off;

    # Forward client info so middleware sees real protocol + IP.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    # Reverse proxy to the Docker container (mc_app maps host :3000).
    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # Block common probing paths at the edge.
    location ~ ^/(\.env|\.git|wp-admin|wp-login\.php|xmlrpc\.php) {
        return 404;
    }
}
